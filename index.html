<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berlin Infrastructure AI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'], },
          keyframes: {
            'slide-up': { '0%': { opacity:'0', transform:'translateY(16px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
            'shimmer': { '0%': { backgroundPosition:'-600px 0' }, '100%': { backgroundPosition:'600px 0' } },
            'dot-bounce': { '0%,80%,100%': { transform:'translateY(0)', opacity:'0.3' }, '40%': { transform:'translateY(-6px)', opacity:'1' } },
          },
          animation: {
            'slide-up': 'slide-up 0.45s cubic-bezier(0.16,1,0.3,1) forwards',
            'shimmer': 'shimmer 1.6s linear infinite',
            'dot-bounce': 'dot-bounce 1.2s ease-in-out infinite',
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif; background-color: #f8fafc;
      background-image: radial-gradient(at 20% 15%, rgba(37,99,235,0.05) 0%, transparent 55%), radial-gradient(at 82% 78%, rgba(99,102,241,0.04) 0%, transparent 50%);
      min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    #question-input { font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; transition: box-shadow .2s ease, border-color .2s ease; }
    #question-input:focus { border-color: rgba(37,99,235,0.45); box-shadow: 0 0 0 3px rgba(37,99,235,0.10), 0 8px 32px rgba(37,99,235,0.08); }
    #submit-btn { transition: background .15s, transform .1s; }
    #submit-btn:hover:not(:disabled) { background: #1a4fd1; transform: translateY(-1px); }
    #submit-btn:disabled { opacity: .55; cursor: not-allowed; }
    .shimmer-bar { background: linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size: 600px 100%; border-radius: 6px; animation: shimmer 1.6s linear infinite; }
    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#2563eb; }
    .dot:nth-child(1) { animation: dot-bounce 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: dot-bounce 1.2s ease-in-out .2s infinite; }
    .dot:nth-child(3) { animation: dot-bounce 1.2s ease-in-out .4s infinite; }
    .kbd { display:inline-flex; align-items:center; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:4px; padding:1px 5px; font-family:'JetBrains Mono',monospace; font-size:.7rem; color:#64748b; }
    #sql-block { font-family:'JetBrains Mono',monospace; font-size:.82rem; line-height:1.75; }
    .sql-kw { color:#93c5fd; font-weight:600; } .sql-fn { color:#a5b4fc; } .sql-str { color:#6ee7b7; } .sql-num { color:#fcd34d; } .sql-op { color:#f9a8d4; }
    .ans-table th { font-size:.72rem; font-weight:600; text-transform:uppercase; color:#64748b; padding:.65rem 1rem; border-bottom:1.5px solid #e2e8f0; background:#f8fafc; }
    .ans-table td { padding:.65rem 1rem; font-size:.875rem; color:#0f172a; border-bottom:1px solid #f1f5f9; }
    .leaflet-popup-content-wrapper { border-radius:10px !important; box-shadow: 0 4px 24px rgba(0,0,0,0.10) !important; padding:0 !important; overflow:hidden; }
    .leaflet-popup-content { margin:0 !important; } .leaflet-popup-tip { background:#fff !important; box-shadow:none !important; }
    .marker-ring { animation: marker-pulse 2.2s ease-out infinite; transform-origin:center; }
    @keyframes marker-pulse { 0%,100% { transform:scale(1); opacity:.6; } 50% { transform:scale(1.6); opacity:0; } }
    #pin-list::-webkit-scrollbar { width:4px; } #pin-list::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:4px; }
    #sql-panel.open #sql-toggle-icon { transform:rotate(180deg); }
    .stat-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px 3px 8px; border-radius:999px; font-size:.72rem; font-weight:500; }
    #result-card { animation:slide-up .45s cubic-bezier(0.16,1,0.3,1) forwards; }
  </style>
</head>
<body class="relative min-h-screen flex flex-col">

  <header class="relative z-20 flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-white/70 backdrop-blur-md sticky top-0">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center shadow-sm"><i class="ph-bold ph-city text-white" style="font-size:14px;"></i></div>
      <span class="font-semibold text-slate-900 text-sm tracking-tight">Berlin Infrastructure AI</span>
    </div>
  </header>

  <main class="relative z-10 flex-1 flex flex-col items-center px-4 pt-16 pb-24">
    <div class="text-center mb-9 select-none">
      <h1 class="text-4xl sm:text-5xl font-bold text-slate-900 tracking-tight leading-tight mb-3">
        Query physical infrastructure<br/>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500">at the speed of thought.</span>
      </h1>
      <p class="text-slate-500 text-base max-w-lg mx-auto leading-relaxed">Ask anything about roads, bridges, and closures in Berlin.</p>
    </div>

    <div class="w-full max-w-2xl mb-3">
      <div class="relative group">
        <div class="relative bg-white border border-slate-200 rounded-2xl shadow-lg shadow-slate-200/60 overflow-hidden">
          <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"><i class="ph-bold ph-magnifying-glass text-slate-400" style="font-size:18px;"></i></div>
          <textarea id="question-input" rows="1" placeholder="e.g. Show me all active sites in Pankow." class="w-full pl-11 pr-36 py-4 bg-transparent resize-none border-0 text-slate-900 leading-relaxed overflow-hidden" style="min-height:56px; max-height:160px;"></textarea>
          <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
            <span class="hidden sm:flex items-center gap-1"><span class="kbd">↵</span></span>
            <button id="submit-btn" class="flex items-center gap-1.5 bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-xl"><i class="ph-bold ph-paper-plane-right" style="font-size:14px;"></i> Ask</button>
          </div>
        </div>
      </div>
    </div>

    <div class="w-full max-w-5xl mb-6 mt-8">
      <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-slate-100">
          <div class="flex items-center gap-2.5">
            <i class="ph-bold ph-map-trifold text-slate-500" style="font-size:16px;"></i>
            <span class="text-sm font-semibold text-slate-800">Interactive Map</span>
            <span id="map-pin-count" class="text-[11px] bg-slate-100 text-slate-500 font-mono px-2 py-0.5 rounded-full">0 pins</span>
          </div>
          <div class="flex items-center gap-4">
            <div id="dynamic-legend" class="hidden md:flex flex-wrap items-center gap-3 text-[11px] text-slate-500 font-medium"></div>
          </div>
        </div>

        <div class="flex" style="height:420px;">
          <div id="map" class="flex-1 z-10 relative"></div>
          <div class="w-64 border-l border-slate-100 flex-col bg-slate-50/60 hidden sm:flex flex-shrink-0">
            <div class="px-3 py-2.5 border-b border-slate-100 flex items-center justify-between">
              <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Filtered Sites</p>
              <span id="sidebar-count" class="text-[10px] font-mono text-slate-400">—</span>
            </div>
            <div id="pin-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-1"></div>
          </div>
        </div>

        <div id="map-status-bar" class="px-4 py-2 border-t border-slate-100 bg-slate-50/70 flex items-center gap-2 text-xs text-slate-400 font-mono transition-colors">
          <i class="ph ph-info" style="font-size:12px;"></i><span id="map-status-msg">Idle</span>
        </div>
      </div>
    </div>

    <div id="output-area" class="w-full max-w-5xl space-y-4"></div>
  </main>

  <script>
  'use strict';

  const BERLIN_CENTER = [52.5200, 13.4050];
  const map = L.map('map', { center: BERLIN_CENTER, zoom: 11, zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  const markerLayer = L.layerGroup().addTo(map);
  const boundaryLayer = L.layerGroup().addTo(map);

  // --- STATE MANAGEMENT & TRANSLATION ---
  let currentMapData = [];         
  let activeSeverities = new Set(); 
  
  // Data Dictionary: Strictly lowercase keys to prevent mismatches
  const SEVERITY_MAP = {
    'vollsperrung': { label: 'Full Closure', fill: '#ef4444', ring: '#fca5a5' },           
    'fahrtrichtungssperrung': { label: 'Directional Closure', fill: '#f97316', ring: '#fdba74' }, 
    'keine sperrung': { label: 'No Closure', fill: '#3b82f6', ring: '#93c5fd' },           
    'unknown': { label: 'Unknown', fill: '#94a3b8', ring: '#cbd5e1' }                      
  };

  /* ── 1. Build the Clickable Legend ───────────────────── */
  function buildLegend(locations) {
    const legend = document.getElementById('dynamic-legend');
    legend.innerHTML = '';
    activeSeverities.clear();

    const uniqueSeverities = [...new Set(locations.map(l => l.severity || 'Unknown'))].sort();

    uniqueSeverities.forEach((sev) => {
      activeSeverities.add(sev); 
      
      // Force lowercase to match the SEVERITY_MAP safely
      const lookupKey = sev.trim().toLowerCase();
      const mapped = SEVERITY_MAP[lookupKey] || SEVERITY_MAP['unknown'];

      const btn = document.createElement('button');
      btn.className = 'flex items-center gap-1.5 transition-opacity duration-200 hover:text-slate-800';
      btn.innerHTML = `<span class="w-2.5 h-2.5 rounded-full inline-block" style="background:${mapped.fill}"></span>${escapeHTML(mapped.label)}`;
      
      btn.onclick = () => {
        if (activeSeverities.has(sev)) {
          activeSeverities.delete(sev);
          btn.style.opacity = '0.35';
        } else {
          activeSeverities.add(sev);
          btn.style.opacity = '1';
        }
        refreshMapUI(); 
      };
      legend.appendChild(btn);
    });
  }

  /* ── 2. Refresh the Map & Sidebar ────────────────────── */
  async function refreshMapUI() {
    markerLayer.clearLayers();
    boundaryLayer.clearLayers();
    document.getElementById('pin-list').innerHTML = '';

    const visibleData = currentMapData.filter(site => activeSeverities.has(site.severity || 'Unknown'));

    if (visibleData.length === 0) {
      document.getElementById('map-pin-count').textContent = '0 pins';
      document.getElementById('sidebar-count').textContent = '0';
      return;
    }

    const bounds = [];
    visibleData.forEach((site, i) => {
      // Force lowercase here as well
      const lookupKey = (site.severity || 'Unknown').trim().toLowerCase();
      const mapped = SEVERITY_MAP[lookupKey] || SEVERITY_MAP['unknown'];
      
      const svg = `<svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="17" r="15" fill="${mapped.ring}" opacity="0.4" class="marker-ring"/>
        <circle cx="18" cy="17" r="11" fill="${mapped.fill}" stroke="white" stroke-width="2.5"/>
        <circle cx="18" cy="17" r="4.5" fill="white" opacity="0.9"/>
        <line x1="18" y1="28" x2="18" y2="41" stroke="${mapped.fill}" stroke-width="2.5" stroke-linecap="round"/>
      </svg>`;
      
      const marker = L.marker([site.lat, site.lng], {
        icon: L.divIcon({ html: svg, className: '', iconSize: [36, 44], iconAnchor: [18, 43], popupAnchor: [0, -44] })
      });

      marker.bindPopup(`
        <div style="font-family:'Inter',sans-serif;min-width:190px;padding:5px;">
          <strong style="color:#0f172a;font-size:14px;">${escapeHTML(site.street || 'Site')}</strong><br>
          <span style="color:gray;font-size:12px;">${escapeHTML(site.district || 'Berlin')}</span><br><br>
          <span style="background:${mapped.fill};color:white;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:bold;">${escapeHTML(mapped.label)}</span>
        </div>
      `);
      marker.addTo(markerLayer);
      bounds.push([site.lat, site.lng]);

      const el = document.createElement('button');
      el.className = 'w-full text-left px-2.5 py-2 rounded-lg hover:bg-white hover:shadow-sm border border-transparent transition-all';
      el.innerHTML = `
        <div class="flex items-center gap-2">
          <span style="width:8px;height:8px;border-radius:50%;background:${mapped.fill};display:inline-block;"></span>
          <span class="text-xs font-medium text-slate-700 truncate">${escapeHTML(site.street || 'Site')}</span>
        </div>
        <div class="text-[10px] text-slate-400 mt-0.5 truncate pl-4">${escapeHTML(site.district || '')}</div>`;
      el.onclick = () => { map.flyTo([site.lat, site.lng], 16, { animate: true }); marker.openPopup(); };
      document.getElementById('pin-list').appendChild(el);
    });

    const uniqueDistricts = [...new Set(visibleData.map(s => s.district).filter(Boolean))];
    let boundaryDrawn = false;

    if (uniqueDistricts.length === 1) {
      const districtName = uniqueDistricts[0];
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=geojson&polygon_geojson=1&q=${encodeURIComponent(districtName + ', Berlin, Germany')}`);
        const geoData = await response.json();
        const polygonFeature = geoData?.features?.find(f => f.geometry.type === 'Polygon' || f.geometry.type === 'MultiPolygon');
        if (polygonFeature) {
          const layer = L.geoJSON(polygonFeature, { style: { color: '#3b82f6', weight: 2, fillOpacity: 0.08 } }).addTo(boundaryLayer);
          map.flyToBounds(layer.getBounds(), { padding: [20, 20], animate: true });
          boundaryDrawn = true;
        }
      } catch (e) { console.error("Boundary error:", e); }
    }

    if (!boundaryDrawn && bounds.length > 0) {
      if (bounds.length === 1) map.flyTo(bounds[0], 15);
      else map.flyToBounds(L.latLngBounds(bounds), { padding: [40, 40] });
    }

    document.getElementById('map-pin-count').textContent = `${visibleData.length} pins`;
    document.getElementById('sidebar-count').textContent = visibleData.length;
    setMapStatus(`Showing ${visibleData.length} filtered sites`, 'success');
  }

  /* ── 3. Pipeline Intake ──────────────────────────────── */
  function dropPins(locations) {
    const geoData = locations.filter(s => s.lat != null && s.lng != null);
    if (!geoData.length) return;
    
    currentMapData = geoData; 
    buildLegend(currentMapData);
    refreshMapUI();
  }

  /* ── Startup & UI Utilities ──────────────────────────── */
  (async () => {
    try {
      const res = await fetch('/locations');
      if (res.ok) {
        const data = await res.json();
        dropPins(data);
      }
    } catch (e) {}
  })();

  function setMapStatus(msg, type = 'idle') {
    const bar = document.getElementById('map-status-bar');
    const span = document.getElementById('map-status-msg');
    span.textContent = msg;
    bar.className = 'px-4 py-2 border-t border-slate-100 flex items-center gap-2 text-xs font-mono transition-colors ';
    if (type === 'success') bar.className += 'bg-emerald-50/70 text-emerald-600';
    else if (type === 'loading') bar.className += 'bg-blue-50/70 text-blue-500';
    else if (type === 'error') bar.className += 'bg-red-50/70 text-red-500';
  }

  function escapeHTML(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  
  const input = document.getElementById('question-input');
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
  document.getElementById('submit-btn').addEventListener('click', submit);

  // The Main API Caller
  async function submit() {
    const question = input.value.trim();
    if (!question) return;

    const btn = document.getElementById('submit-btn');
    const area = document.getElementById('output-area');
    
    btn.disabled = true; btn.innerHTML = 'Thinking…';
    area.innerHTML = '<div class="bg-white p-6 rounded-2xl shadow-sm text-slate-500 text-sm font-medium animate-pulse">Querying Database...</div>';
    setMapStatus('Running AI query…', 'loading');

    try {
      const res = await fetch('http://localhost:8000/ask', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question }),
      });
      const data = await res.json();
      
      const rows = Array.isArray(data.answer) ? data.answer : [];
      // Map raw SQL to standard lat/lng
      rows.forEach(r => { if(r.latitude !== undefined) r.lat = r.latitude; if(r.longitude !== undefined) r.lng = r.longitude; });
      
      const geoRows = rows.filter(r => r.lat != null && r.lng != null);

      if (geoRows.length > 0) {
        dropPins(geoRows);
        document.getElementById('map').scrollIntoView({ behavior:'smooth', block:'nearest' });
      } else {
        setMapStatus('Query successful — no map data returned', 'success');
      }

      // Render the Data Table
      if (rows.length > 0) {
        const cols = Object.keys(rows[0]);
        const heads = cols.map(c => `<th class="text-left whitespace-nowrap">${escapeHTML(c)}</th>`).join('');
        const body = rows.map(row => `<tr>${cols.map(c => `<td class="whitespace-nowrap">${escapeHTML(String(row[c] ?? ''))}</td>`).join('')}</tr>`).join('');
        area.innerHTML = `
          <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden animate-slide-up">
            <div class="px-6 pt-5 pb-4 border-b border-slate-50"><p class="text-sm font-semibold text-slate-900">${escapeHTML(data.question)}</p></div>
            <div class="overflow-x-auto"><table class="ans-table w-full border-collapse"><thead><tr>${heads}</tr></thead><tbody>${body}</tbody></table></div>
            <div class="px-6 py-3 border-t border-slate-100 bg-slate-900 overflow-x-auto"><pre class="text-emerald-400 text-xs font-mono">${escapeHTML(data.executed_sql)}</pre></div>
          </div>`;
      } else {
        area.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow-sm text-slate-500 text-sm font-medium">No rows returned.</div>`;
      }
    } catch (err) {
      area.innerHTML = `<div class="bg-red-50 text-red-500 p-6 rounded-2xl text-sm font-medium">Request failed: ${escapeHTML(err.message)}</div>`;
      setMapStatus('Error connecting to API', 'error');
    } finally {
      btn.disabled = false; btn.innerHTML = 'Ask';
    }
  }
  </script>
</body>
</html>
